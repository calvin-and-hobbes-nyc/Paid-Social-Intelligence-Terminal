<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Test</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;background:#f6f8fa;margin:0;padding:24px;color:#111}
.box{max-width:900px;margin:0 auto;background:#fff;border:1px solid #d0d7de;padding:20px;border-radius:12px}
h1{margin-top:0}
.ok{background:#edf7ed;border:1px solid #b7dfb9;color:#1f5c35;padding:12px;border-radius:8px;margin:12px 0}
.err{background:#fff4f4;border:1px solid #efcaca;color:#8b1e1e;padding:12px;border-radius:8px;margin:12px 0;white-space:pre-wrap}
pre{background:#f6f8fa;border:1px solid #d0d7de;padding:12px;border-radius:8px;overflow:auto}
code{background:#f6f8fa;padding:2px 6px;border-radius:6px}
</style>
</head>
<body>
<div class="box">
  <h1>JSON Test Page</h1>
  <p>This page only tests whether GitHub Pages can read <code>data/latest.json</code> and <code>data/archive.json</code>.</p>
  <div id="result">Testing…</div>
  <h2>latest.json</h2>
  <pre id="latestBox">Waiting…</pre>
  <h2>archive.json</h2>
  <pre id="archiveBox">Waiting…</pre>
</div>

<script>
async function testJSON() {
  const result = document.getElementById('result');
  const latestBox = document.getElementById('latestBox');
  const archiveBox = document.getElementById('archiveBox');

  try {
    const latestRes = await fetch('./data/latest.json', {cache:'no-store'});
    if (!latestRes.ok) throw new Error('latest.json failed with status ' + latestRes.status);
    const latest = await latestRes.json();
    latestBox.textContent = JSON.stringify(latest, null, 2);

    const archiveRes = await fetch('./data/archive.json', {cache:'no-store'});
    if (!archiveRes.ok) throw new Error('archive.json failed with status ' + archiveRes.status);
    const archive = await archiveRes.json();
    archiveBox.textContent = JSON.stringify(archive, null, 2);

    result.innerHTML = '<div class="ok">Success: both JSON files loaded correctly.</div>';
  } catch (err) {
    result.innerHTML = '<div class="err">Error: ' + err.message + '\n\nIf this says 404, the path or filename is wrong. If this says Unexpected token, the JSON content is malformed.</div>';
    latestBox.textContent = 'Could not load latest.json';
    archiveBox.textContent = 'Could not load archive.json';
  }
}
testJSON();
</script>
</body>
</html>
