name: Daily Edition Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create test file
        run: |
          echo "Automation working" > automation-test.txt

      - name: Commit test file
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add automation-test.txt
          git commit -m "Automation test commit"
          git push
