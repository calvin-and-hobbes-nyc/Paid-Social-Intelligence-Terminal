name: Daily Edition Test

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create test file
        run: echo "Automation working" > automation-test.txt

      - name: Commit test file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add automation-test.txt
          git commit -m "Automation test commit" || echo "No changes to commit"
          git push
