name: Daily Edition Builder

on:
  workflow_dispatch:
  schedule:
    - cron: '5 12 * * *'
    - cron: '5 13 * * *'

permissions:
  contents: write

jobs:
  build-edition:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set New York date and hour
        id: now
        run: |
          echo "today=$(TZ=America/New_York date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "hour=$(TZ=America/New_York date +'%H')" >> $GITHUB_OUTPUT

      - name: Stop unless it is 8 AM New York time
        if: github.event_name == 'schedule' && steps.now.outputs.hour != '08'
        run: |
          echo "Not 8 AM in New York. Exiting."
          exit 0

      - name: Build full-schema dated edition from latest.json
        env:
          TODAY: ${{ steps.now.outputs.today }}
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime

          today = os.environ["TODAY"]
          dt = datetime.strptime(today, "%Y-%m-%d")
          label = dt.strftime("%B %d, %Y")

          with open("data/latest.json", "r", encoding="utf-8") as f:
              edition = json.load(f)

          edition["label"] = label
          edition["date_key"] = today

          with open(f"data/{today}.json", "w", encoding="utf-8") as f:
              json.dump(edition, f, ensure_ascii=False, indent=2)
          PY

      - name: Update latest.json from dated edition
        env:
          TODAY: ${{ steps.now.outputs.today }}
        run: |
          cp "data/${TODAY}.json" data/latest.json

      - name: Update archive.json
        env:
          TODAY: ${{ steps.now.outputs.today }}
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime

          today = os.environ["TODAY"]
          dt = datetime.strptime(today, "%Y-%m-%d")
          label = dt.strftime("%B %d, %Y")

          try:
              with open("data/archive.json", "r", encoding="utf-8") as f:
                  archive = json.load(f)
          except FileNotFoundError:
              archive = []

          # Remove any existing entries for today or latest.json
          archive = [
              item for item in archive
              if item.get("file") not in ("latest.json", f"{today}.json")
              and item.get("date_key") != today
          ]

          new_items = [
              {
                  "date_key": today,
                  "label": label,
                  "file": "latest.json"
              },
              {
                  "date_key": today,
                  "label": label,
                  "file": f"{today}.json"
              }
          ]

          archive = new_items + archive

          with open("data/archive.json", "w", encoding="utf-8") as f:
              json.dump(archive, f, ensure_ascii=False, indent=2)
          PY

      - name: Commit changes
        env:
          TODAY: ${{ steps.now.outputs.today }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/archive.json "data/${TODAY}.json"
          git commit -m "Build daily edition" || echo "No changes to commit"
          git push
