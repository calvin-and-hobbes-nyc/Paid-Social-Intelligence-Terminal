name: Daily Edition Builder

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-edition:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set today date
        id: today
        run: echo "today=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create dated edition file
        run: |
          cat > data/${{ steps.today.outputs.today }}.json <<EOF
          {
            "label": "${{ steps.today.outputs.today }}",
            "date_key": "${{ steps.today.outputs.today }}",
            "lead_title": "Automated test edition for ${{ steps.today.outputs.today }}",
            "lead_summary": "This is a test daily edition created by GitHub Actions."
          }
          EOF

      - name: Update latest.json
        run: |
          cp data/${{ steps.today.outputs.today }}.json data/latest.json

      - name: Update archive.json
        run: |
          cat > data/archive.json <<EOF
          [
            {
              "date_key": "${{ steps.today.outputs.today }}",
              "label": "${{ steps.today.outputs.today }}",
              "file": "latest.json"
            },
            {
              "date_key": "${{ steps.today.outputs.today }}",
              "label": "${{ steps.today.outputs.today }}",
              "file": "${{ steps.today.outputs.today }}.json"
            }
          ]
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/archive.json data/${{ steps.today.outputs.today }}.json
          git commit -m "Build test daily edition" || echo "No changes to commit"
          git push
