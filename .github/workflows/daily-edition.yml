name: Daily Edition Builder

on:
  schedule:
    - cron: "5 8 * * *"
    - cron: "35 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-edition:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run no-AI edition builder
        run: python scripts/build_edition.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/archive.json data/*.json
          git commit -m "Build daily edition" || echo "No changes to commit"
          git push
