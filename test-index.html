<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hobbes Test Page</title>
<style>
:root{--bg:#eef2f5;--paper:#fff;--ink:#111;--muted:#5f6b76;--rule:#d9e0e6;--accent:#1d4f80}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-family:Georgia,"Times New Roman",serif}
.wrap{max-width:1200px;margin:0 auto;padding:20px}.paper{background:var(--paper);border:1px solid var(--rule)}
.banner{padding:28px;border-bottom:1px solid var(--rule);background:#111;color:#fff}
.banner h1{margin:0 0 10px;font-size:40px}.banner p{margin:0;color:#d7dde2;line-height:1.55}
.top{padding:16px 20px;border-bottom:1px solid var(--rule);display:flex;gap:12px;flex-wrap:wrap;align-items:center}
select,input{border:1px solid var(--rule);padding:10px 12px;border-radius:10px;font-size:14px}
.section{padding:22px 20px;border-bottom:1px solid var(--rule)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.card{border:1px solid var(--rule);background:#fff}
.card img{display:block;width:100%;height:260px;object-fit:cover}
.card .body{padding:14px}
.card h3{margin:0 0 8px;font-size:28px;line-height:1.08}
.card p{margin:0 0 10px;line-height:1.6;color:#33404a}
.mini-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.mini{border:1px solid var(--rule);padding:14px}
.mini h4{margin:0 0 8px;font-size:22px;line-height:1.15}
.muted{font-family:Arial,Helvetica,sans-serif;text-transform:uppercase;letter-spacing:.12em;font-size:11px;color:var(--muted);font-weight:700}
.error{padding:16px 20px;background:#fff4f4;color:#8b1e1e;border-bottom:1px solid #efcaca;display:none;white-space:pre-wrap;font-family:Arial,Helvetica,sans-serif}
.ok{padding:12px 20px;background:#f4fbf6;color:#1f5c35;border-bottom:1px solid #cbe6d3;font-family:Arial,Helvetica,sans-serif}
@media (max-width:900px){.grid,.mini-grid{grid-template-columns:1fr}.card img{height:220px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="paper">
    <div class="banner">
      <h1>Hobbes Test Page</h1>
      <p>This is a safe test page. It reads from JSON files without touching your live homepage.</p>
    </div>
    <div class="top">
      <select id="dateSelect"></select>
      <input id="searchInput" placeholder="Search headlines..." />
      <div class="muted" id="statusText">Loading…</div>
    </div>
    <div id="errorBox" class="error"></div>
    <div class="ok">Test URL goal: <strong>/test-index.html</strong>. Once this works, we can safely move the same JSON logic into the real homepage.</div>

    <section class="section">
      <div class="muted" id="editionLabel">Edition</div>
      <h2 id="leadTitle" style="font-size:42px;line-height:1.05;margin:8px 0 12px;"></h2>
      <p id="leadSummary" style="font-size:20px;line-height:1.6;color:#33404a;margin:0;"></p>
    </section>

    <section class="section">
      <div class="muted">Front Page Stories</div>
      <div class="grid" id="frontGrid"></div>
    </section>

    <section class="section">
      <div class="muted">Platform Briefings</div>
      <div class="mini-grid" id="briefGrid"></div>
    </section>
  </div>
</div>

<script>
async function loadJSON(path){
  const res = await fetch(path);
  if(!res.ok) throw new Error('Failed to load ' + path + ' (' + res.status + ')');
  return await res.json();
}

async function init(){
  const errorBox = document.getElementById('errorBox');
  try{
    const archive = await loadJSON('data/archive.json');
    const dateSelect = document.getElementById('dateSelect');
    archive.forEach(item => {
      const opt = document.createElement('option');
      opt.value = item.file;
      opt.textContent = item.label;
      dateSelect.appendChild(opt);
    });

    async function render(){
      const file = dateSelect.value || 'latest.json';
      const data = await loadJSON('data/' + file);
      const q = document.getElementById('searchInput').value.trim().toLowerCase();

      document.getElementById('statusText').textContent = 'JSON loading works';
      document.getElementById('editionLabel').textContent = data.label;
      document.getElementById('leadTitle').textContent = data.lead_title;
      document.getElementById('leadSummary').textContent = data.lead_summary;

      const front = (data.articles || []).filter(a => !q || JSON.stringify(a).toLowerCase().includes(q));
      const brief = (data.briefings || []).filter(a => !q || JSON.stringify(a).toLowerCase().includes(q));

      document.getElementById('frontGrid').innerHTML = front.map(a => `
        <article class="card">
          <img src="${a.image}" alt="${a.platform}">
          <div class="body">
            <div class="muted">${a.platform}</div>
            <h3>${a.headline}</h3>
            <p>${a.summary}</p>
            <a href="${a.url}" target="_blank" rel="noopener">Open source ↗</a>
          </div>
        </article>
      `).join('');

      document.getElementById('briefGrid').innerHTML = brief.map(a => `
        <div class="mini">
          <div class="muted">${a.platform}</div>
          <h4>${a.headline}</h4>
          <p>${a.summary}</p>
        </div>
      `).join('');
    }

    dateSelect.addEventListener('change', render);
    document.getElementById('searchInput').addEventListener('input', render);
    await render();
  }catch(err){
    errorBox.style.display = 'block';
    errorBox.textContent = 'Test page error: ' + err.message + '\n\nThis usually means the JSON file path is wrong or the file is missing.';
    document.getElementById('statusText').textContent = 'JSON load failed';
  }
}

init();
</script>
</body>
</html>
